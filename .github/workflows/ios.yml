name: iOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Build JoePointIgnition
        run: |
          xcodebuild build \
            -project JoePointIgnition.xcodeproj \
            -scheme JoePointIgnition \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            IPHONEOS_DEPLOYMENT_TARGET=26.0 \
            TARGETED_DEVICE_FAMILY=1 \
            SWIFT_VERSION=6.0 \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO
